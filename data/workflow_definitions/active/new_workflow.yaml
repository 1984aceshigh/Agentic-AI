workflow_id: new_workflow
workflow_name: new_workflow
version: 0.1.0
nodes:
- config:
    prompt: 中国の故事成語を1つ出力してください。
    output_format: 故事成語以外のテキストは出力厳禁
  id: start_node
  name: Start Node
  type: llm_generate
  group: A
- config:
    prompt: 指定の故事成語について、歴史や意味を解説してください。
    input_definition: '[参照ノード: start_node.result]'
  id: first_node
  name: First Node
  type: llm_generate
  group: A
- config:
    prompt: 与えられた故事成語に最も意味が近い別の故事成語を出力してください
    input_definition: '[参照ノード: start_node.result]'
    output_format: 故事成語以外のテキストは不要
  id: second_node
  name: Second Node
  type: llm_generate
edges:
- from: start_node
  to: first_node
- from: start_node
  to: second_node
