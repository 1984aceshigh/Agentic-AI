workflow_id: new_workflow
workflow_name: new_workflow
version: 0.1.0
nodes:
- config:
    prompt: 中国の故事成語を1つ出力してください。
    output_format: 故事成語以外のテキストは出力厳禁
  id: start_node
  name: Start Node
  type: llm_generate
- config:
    prompt: 指定の故事成語について、歴史や意味を解説してください。
    input_definition: 'ref: start_node.result'
  id: hello_node
  name: Hello Node
  type: llm_generate
- id: end_node
  name: End Node
  type: deterministic_transform
edges:
- from: start_node
  to: hello_node
- from: hello_node
  to: end_node
