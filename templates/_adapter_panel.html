<div class="card">
  <h3>Adapter Information</h3>
  <table>
    <tbody>
      <tr><th>adapter_ref</th><td>{{ node.adapter_ref or "-" }}</td></tr>
      <tr><th>contract</th><td>{{ node.contract or "-" }}</td></tr>
      <tr><th>connection_ref</th><td>{{ node.connection_ref or "-" }}</td></tr>
      <tr><th>resolved_capabilities</th><td>{{ node.resolved_capabilities|join(', ') if node.resolved_capabilities else '-' }}</td></tr>
    </tbody>
  </table>
</div>
